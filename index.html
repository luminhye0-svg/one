<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>루이스 구조 드래그 시뮬레이션</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background-color: #1e1e1e;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
        }

        /* 설명 텍스트 */
        .info {
            position: absolute;
            top: 20px;
            text-align: center;
            color: #aaaaaa;
            pointer-events: none;
        }

        /* 원소들이 배치될 컨테이너 */
        #container {
            position: relative;
            width: 100vw;
            height: 100vh;
        }

        /* 원소(알파벳) 스타일 */
        .element {
            position: absolute;
            width: 80px;
            height: 80px;
            font-size: 3.5rem;
            font-weight: bold;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            transition: transform 0.1s ease;
        }

        .element:active {
            cursor: grabbing;
            transform: scale(1.05);
        }

        /* 루이스 점(Dot) 공통 스타일 */
        .dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background-color: #ff5722; /* 전자는 눈에 띄는 주황색으로 설정 */
            border-radius: 50%;
        }

        /* --- 루이스 구조 위치 정의 (원소 중심 기준 변위) --- */
        /* 단일 점 위치 */
        .top    { top: -12px; left: 36px; }
        .bottom { bottom: -12px; left: 36px; }
        .left   { left: -12px; top: 36px; }
        .right  { right: -12px; top: 36px; }

        /* 비공유 전자쌍(Pair) 위치 */
        .top-pair-1    { top: -12px; left: 30px; }
        .top-pair-2    { top: -12px; left: 42px; }
        .bottom-pair-1 { bottom: -12px; left: 30px; }
        .bottom-pair-2 { bottom: -12px; left: 42px; }
    </style>
</head>
<body>

    <div class="info">
        <h2>루이스 구조 (Lewis Structure) 드래그</h2>
        <p>원소 기호를 마우스로 클릭하고 드래그해 보세요.</p>
    </div>

    <div id="container">
        <!-- 탄소 (C) : 최외각 전자 4개 -->
        <div class="element" id="C" style="top: 45%; left: 25%;">
            C
            <div class="dot top"></div>
            <div class="dot bottom"></div>
            <div class="dot left"></div>
            <div class="dot right"></div>
        </div>

        <!-- 질소 (N) : 최외각 전자 5개 (1쌍 + 3홀전자) -->
        <div class="element" id="N" style="top: 45%; left: 45%;">
            N
            <div class="dot top-pair-1"></div>
            <div class="dot top-pair-2"></div>
            <div class="dot bottom"></div>
            <div class="dot left"></div>
            <div class="dot right"></div>
        </div>

        <!-- 산소 (O) : 최외각 전자 6개 (2쌍 + 2홀전자) -->
        <div class="element" id="O" style="top: 45%; left: 65%;">
            O
            <div class="dot top-pair-1"></div>
            <div class="dot top-pair-2"></div>
            <div class="dot bottom-pair-1"></div>
            <div class="dot bottom-pair-2"></div>
            <div class="dot left"></div>
            <div class="dot right"></div>
        </div>
    </div>

    <script>
        const elements = document.querySelectorAll('.element');
        let isDragging = false;
        let currentElement = null;
        let offsetX = 0;
        let offsetY = 0;

        elements.forEach(element => {
            // 마우스 누를 때 드래그 시작
            element.addEventListener('mousedown', (e) => {
                isDragging = true;
                currentElement = element;
                
                // 선택한 원소 안에서 마우스가 클릭된 실제 좌표 계산
                offsetX = e.clientX - element.getBoundingClientRect().left;
                offsetY = e.clientY - element.getBoundingClientRect().top;
                
                // 드래그 중인 원소를 화면 가장 앞으로 가져오기
                elements.forEach(el => el.style.zIndex = 1);
                element.style.zIndex = 10;
            });
        });

        // 마우스 움직일 때 원소 이동
        document.addEventListener('mousemove', (e) => {
            if (!isDragging || !currentElement) return;

            // 마우스 좌표에서 오프셋을 빼서 원소의 새로운 위치 계산
            const x = e.clientX - offsetX;
            const y = e.clientY - offsetY;

            // 점(Dot)들은 HTML 구조상 원소(.element)의 자식 요소(Child)로 들어가 있으므로,
            // 원소의 부모 좌표(top, left)만 바꿔주면 내부의 점들은 자동으로 함께 움직입니다.
            currentElement.style.left = `${x}px`;
            currentElement.style.top = `${y}px`;
        });

        // 마우스를 떼면 드래그 종료
        document.addEventListener('mouseup', () => {
            isDragging = false;
            currentElement = null;
        });
    </script>
</body>
</html>
